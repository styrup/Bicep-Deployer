<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{.AppTitle}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon" id="header-icon"></span>
        <span>{{.AppTitle}}</span>
      </div>
      <div class="auth-section">
        <div id="auth-logged-out" class="hidden">
          <button id="btn-login" class="btn btn-primary">Log ind med Azure</button>
        </div>
        <div id="auth-logged-in" class="hidden">
          <span id="user-name" class="user-label"></span>
          <button id="btn-logout" class="btn btn-ghost">Log ud</button>
        </div>
      </div>
    </div>
  </header>

  <main class="app-main">
    <!-- Login prompt -->
    <section id="section-login" class="center-section">
      <div class="login-card">
        <span class="login-icon" id="login-icon"></span>
        <h1>{{.AppTitle}}</h1>
        <p class="login-subtitle">Deploy Azure Bicep templates direkte fra din browser ved hjælp af din Azure-identitet.</p>
        <button id="btn-login-main" class="btn btn-primary btn-large">Log ind med Azure</button>
      </div>
    </section>

    <!-- Main app (shown when logged in) -->
    <section id="section-app" class="hidden app-layout">
      <aside class="sidebar">
        <div class="sidebar-section">
          <label class="field-label">Subscription</label>
          <select id="select-subscription" class="select">
            <option value="">Vælg subscription…</option>
          </select>
        </div>

        <div class="sidebar-section">
          <label class="field-label">Templates</label>
          <div id="templates-loading" class="status-text hidden">Henter templates…</div>
          <div id="template-groups"></div>
        </div>
      </aside>

      <div class="deploy-panel">
        <!-- Empty state -->
        <div id="panel-empty" class="empty-state">
          <p>Vælg en template for at komme i gang.</p>
        </div>

        <!-- Template form -->
        <div id="panel-form" class="hidden">
          <h2 id="template-title" class="panel-title"></h2>
          <div id="template-meta" class="template-meta hidden"></div>

          <div id="scope-section" class="form-section">
            <label class="field-label">Deployment scope</label>
            <div class="radio-group">
              <label class="radio-label">
                <input type="radio" name="scope" value="resourceGroup" checked /> Resource Group
              </label>
              <label class="radio-label">
                <input type="radio" name="scope" value="subscription" /> Subscription
              </label>
            </div>
          </div>

          <div id="rg-section" class="form-section">
            <label class="field-label" for="select-rg">Resource Group</label>
            <select id="select-rg" class="select">
              <option value="">Vælg resource group…</option>
            </select>
          </div>

          <div class="form-section">
            <label class="field-label" for="input-deployment-name">Deployment navn</label>
            <input id="input-deployment-name" class="input" type="text" placeholder="my-deployment" value="bicep-deployment" />
          </div>

          <div id="params-container" class="form-section">
            <label class="field-label">Parametre</label>
            <div id="params-fields"></div>
          </div>

          <div class="deploy-actions">
            <button id="btn-deploy" class="btn btn-deploy">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="16" height="16">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Deploy
            </button>
          </div>

          <!-- Result -->
          <div id="deploy-result" class="hidden result-box">
            <div id="result-status" class="result-status"></div>
            <pre id="result-body" class="result-body"></pre>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Config injected by Go template -->
  <script>
    window.AZURE_TENANT_ID = "{{.TenantID}}";
    window.AZURE_CLIENT_ID = "{{.ClientID}}";
    window.APP_ICON = "{{.AppIcon}}";
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.27.0/lib/msal-browser.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
